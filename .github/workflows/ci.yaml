# Continuous integration for CANDID.
#
# Jobs:
#   lint     - static analysis of R source with {lintr} (config in .lintr)
#   format   - verifies R code is formatted with air (config in air.toml)
#   test     - installs dependencies and runs the testthat suite
#   markdown - lints Markdown files (config in .markdownlint.json)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: CI

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::lintr
      - name: Lint
        run: |
          lints <- lintr::lint_dir(".")
          print(lints)
          if (length(lints) > 0) stop(sprintf("Found %d lint(s).", length(lints)))
        shell: Rscript {0}

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: posit-dev/setup-air@v1
      - name: Check formatting
        run: air format --check .

  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shiny
            any::bslib
            any::DT
            any::dplyr
            any::purrr
            any::tibble
            any::htmltools
            any::yaml
            any::testthat
      - name: Run tests
        run: testthat::test_dir("tests/testthat")
        shell: Rscript {0}

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            !renv
