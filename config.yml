# CANDID model configuration.
#
# Each pipeline role maps to a provider + model. R/agents.R (build_chat) selects
# the ellmer constructor from `provider`, so switching providers or models is a
# config change, not a code change. Engine logic reads these via R/config.R and
# never hardcodes a provider or model string.
#
# The pipeline is model-agnostic: any supported provider works, chosen here.
# Credentials come from the environment (see .Renviron.example), never from here:
#   anthropic      -> ANTHROPIC_API_KEY
#   google_gemini  -> GEMINI_API_KEY (or GOOGLE_API_KEY)   <- the API-key path
#   openai         -> OPENAI_API_KEY
#   google_vertex  -> GOOGLE_CLOUD_PROJECT + GOOGLE_CLOUD_LOCATION + Application
#                     Default Credentials (service-account JSON or
#                     `gcloud auth application-default login`); NOT an API key
#
# ellmer serves only Gemini through Google (never Claude). A plain API key uses
# the Gemini Developer API via google_gemini - key only, no project id or
# service-account file. For Claude, set provider: anthropic; for GPT, openai.

default:
  provider: google_gemini
  models:
    # Orchestration and the caveats/veto stage. Default to gemini-2.5-flash, which
    # the Gemini free tier allows and which curates well; switch to gemini-2.5-pro
    # on a paid plan for higher quality (the free tier returns HTTP 429 for pro).
    orchestrator: gemini-2.5-flash
    caveats: gemini-2.5-flash
    # The retrieval specialists: a faster model for speed + cost.
    specialist: gemini-2.5-flash
    # The optional input-curation agent (front-of-pipeline QA): a fast, cheap
    # model, since cleaning tokens is a light interpretive task.
    input_curator: gemini-2.5-flash

# To use Anthropic (Claude) instead, replace the block above with:
#   provider: anthropic
#   models:
#     orchestrator: claude-opus-4-8
#     caveats: claude-opus-4-8
#     specialist: claude-sonnet-5
#     input_curator: claude-haiku-4-5
#
# To use OpenAI (GPT) instead:
#   provider: openai
#   models:
#     orchestrator: gpt-5
#     caveats: gpt-5
#     specialist: gpt-5-mini
#     input_curator: gpt-5-mini
