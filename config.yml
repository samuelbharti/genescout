# CANDID model configuration.
#
# Each pipeline role maps to a provider + model. R/agents.R (build_chat) selects
# the ellmer constructor from `provider`, so switching providers or models is a
# config change, not a code change. Engine logic reads these via R/config.R and
# never hardcodes a provider or model string.
#
# Credentials come from the environment (see .Renviron.example), never from here:
#   anthropic      -> ANTHROPIC_API_KEY
#   google_gemini  -> GEMINI_API_KEY (or GOOGLE_API_KEY)
#   google_vertex  -> GOOGLE_CLOUD_PROJECT + GOOGLE_CLOUD_LOCATION + Application
#                     Default Credentials (service-account JSON via
#                     GOOGLE_APPLICATION_CREDENTIALS, or
#                     `gcloud auth application-default login`)
#
# NOTE: ellmer serves only Gemini through Google (Vertex or the Gemini API), not
# Claude. To use Claude, set provider: anthropic with the claude-* models below.

default:
  provider: google_vertex
  models:
    # Orchestration and the caveats/veto stage: the most capable model.
    orchestrator: gemini-2.5-pro
    caveats: gemini-2.5-pro
    # The three retrieval specialists: a faster model for speed + cost.
    specialist: gemini-2.5-flash

# To use Anthropic directly instead, replace the block above with:
#   provider: anthropic
#   models:
#     orchestrator: claude-opus-4-8
#     caveats: claude-opus-4-8
#     specialist: claude-sonnet-5
