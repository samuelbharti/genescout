# CANDID eval cases.
#
# The DETERMINISTIC spine ranks genes by cross-source prominence (Open Targets
# association, Europe PMC mentions, ClinVar pathogenic variants). It asserts that
# genes with strong multi-source support grade High.
#
# IMPORTANT: with gene-only signals, a prominent-but-off-context gene (e.g. TTN in
# an NF1 study - a huge, heavily-studied gene with many ClinVar variants) also
# scores high. Down-ranking it needs the Phase 2 free-text agent (which knows the
# study context) or a Phase 3 constraint signal (e.g. gnomAD LOEUF). So we do NOT
# assert TTN ranks below the drivers here - that regresses to the agent stage.
#
# `description` is the free-text study context (reserved for the agent; not used
# by the deterministic ranking). Grow these cases as capabilities land.

- description: NF1-associated MPNST - known drivers should grade High.
  candidates: [NF1, SUZ12, CDKN2A, TP53]
  expect_high: [NF1, SUZ12, CDKN2A, TP53]
  expect_grade: High
