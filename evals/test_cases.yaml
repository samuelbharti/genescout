# CANDID eval cases.
#
# The DETERMINISTIC spine ranks genes by cross-source prominence (Open Targets
# association, Europe PMC mentions, ClinVar pathogenic variants). It asserts that
# genes with strong multi-source support grade High.
#
# A prominent-but-off-context gene like TTN (a huge, heavily-studied gene with many
# ClinVar variants) would score high on raw multi-source prominence alone. Two
# mechanisms now push it down: the deterministic CAVEATS/VETO stage sinks recurrent
# sequencing-artifact (FLAGS) genes context-independently, and discovery mode makes
# the whole ranking disease-specific. TTN is a FLAGS gene, so it is vetoed to the
# bottom in BOTH cases below.
#
# `description` is the free-text study context (reserved for the agent; not used
# by the deterministic ranking). `disease` (optional) turns on discovery mode:
# the ranking becomes disease-aware (OT association to THAT disease, ClinVar
# scoped to it, gene+disease co-mention, plus PanelApp/DISEASES). `expect_below`
# asserts a gene ranks strictly below every other candidate. Grow these cases as
# capabilities land.

- description: NF1-associated MPNST - drivers grade High, TTN vetoed to the bottom.
  candidates: [NF1, SUZ12, CDKN2A, TP53, TTN]
  expect_high: [NF1, SUZ12, CDKN2A, TP53]
  expect_grade: High
  expect_below: TTN

# In discovery mode the scoring is disease-SPECIFIC, so only NF1 (the defining
# gene) grades High; TP53/SUZ12/CDKN2A are real cancer genes but not NF1-specific,
# so they land lower - correctly. What the disease-mode spine guarantees is that
# the off-context passenger TTN ranks LAST, below every real candidate.
- description: NF1 discovery - NF1 grades High and TTN ranks last.
  disease: neurofibromatosis type 1
  candidates: [NF1, SUZ12, CDKN2A, TP53, TTN]
  expect_high: [NF1]
  expect_grade: High
  expect_below: TTN

# Selection end-to-end: the same candidates ranked with an explicit CANCER-AXIS
# subset (the opt-in cancer connectors + a few strong evidence sources), proving a
# per-run source selection still ranks the drivers High and vetoes the passenger.
# `sources` is threaded to run_enrich as the query-time selection (only these are
# queried); it exercises the cBioPortal / CIViC / ClinGen connectors.
- description: NF1/MPNST cancer-axis selection - drivers grade High, TTN vetoed.
  candidates: [NF1, SUZ12, CDKN2A, TP53, TTN]
  sources: [ot_assoc, clinvar_path, gnomad_loeuf, cbioportal, civic, clingen]
  expect_high: [NF1, TP53, CDKN2A]
  expect_grade: High
  expect_below: TTN
